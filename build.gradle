plugins {
    id 'java'
    id "com.github.johnrengelman.shadow" version "7.1.0"
}

group 'com.openpackagedbot'
version '1.0'

java{
    sourceCompatibility = 11
    targetCompatibility = 11
}



repositories {
    mavenCentral()
    maven {
        name 'm2-dv8tion'
        url 'https://m2.dv8tion.net/releases'
    }
}

jar{
    manifest{
        attributes 'Main-Class': 'com.openpackagedbot.init.OpenPackagedBot'
    }
}

dependencies {

    implementation 'net.dv8tion:JDA:4.3.0_339'
    implementation 'com.google.code.gson:gson:2.8.9'
    implementation 'org.mongodb:mongodb-driver-sync:4.4.0'
    implementation group: 'org.apache.logging.log4j', name: 'log4j-api', version: '2.15.0'
    implementation group: 'org.apache.logging.log4j', name: 'log4j-core', version: '2.15.0'
    implementation group: 'org.slf4j', name: 'slf4j-log4j12', version: '1.7.32'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.8.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.2'
}

shadowJar{
    destinationDirectory.set(file("."))
}

test {
    useJUnitPlatform()
}